<!DOCTYPE html>
<html>
<head>
  <title>AdCreator-AI Dashboard</title>
  <style>
    body { font-family: Arial; background: #111; color: #fff; padding: 20px; }
    h2 { margin-top: 40px; }
    input, textarea, select { width: 100%; padding: 10px; margin: 5px 0; }
    button { padding: 10px 20px; margin-top: 10px; cursor: pointer; }
    .card { background: #222; padding: 15px; margin: 10px 0; border-radius: 8px; }
  </style>
</head>

<body>

  <h1>AdCreator-AI Dashboard</h1>

  <!-- BRAND MODULE -->
  <h2>Brand Module</h2>
  <input id="brandName" placeholder="Brand Name">
  <textarea id="brandDescription" placeholder="Brand Description"></textarea>
  <input id="brandTone" placeholder="Tone">
  <input id="brandColors" placeholder="Colors (comma separated)">
  <input id="brandAudience" placeholder="Audience">
  <input id="brandMission" placeholder="Mission">
  <input id="brandVision" placeholder="Vision">
  <button onclick="createBrand()">Save Brand</button>
  <div id="brandList"></div>

  <!-- PROJECT MODULE -->
  <h2>Project Module</h2>
  <select id="projectBrand"></select>
  <input id="projectName" placeholder="Project Name">
  <textarea id="projectDescription" placeholder="Project Description"></textarea>
  <input id="projectGoal" placeholder="Project Goal">
  <input id="projectType" placeholder="Project Type">
  <input id="projectAudience" placeholder="Target Audience">
  <input id="projectStatus" placeholder="Status (planning, active, completed)">
  <button onclick="createProject()">Save Project</button>
  <div id="projectList"></div>

  <!-- SCRIPT ENGINE -->
  <h2>Script Engine</h2>
  <select id="scriptProject"></select>
  <input id="scriptTitle" placeholder="Script Title">
  <textarea id="scriptPrompt" placeholder="Prompt / Idea"></textarea>
  <input id="scriptTone" placeholder="Tone">
  <input id="scriptLength" placeholder="Length (short, medium, long)">
  <button onclick="createScript()">Save Script</button>
  <div id="scriptList"></div>

  <!-- VIDEO ENGINE -->
  <h2>Video Engine</h2>
  <select id="videoProject"></select>
  <select id="videoScript"></select>
  <input id="videoTitle" placeholder="Video Title">
  <input id="videoFormat" placeholder="Format (vertical, horizontal, square)">
  <input id="videoDuration" placeholder="Duration (15s, 30s, 60s)">
  <input id="videoResolution" placeholder="Resolution (1080x1920)">
  <input id="videoStatus" placeholder="Status (planning, rendering, completed)">
  <textarea id="videoNotes" placeholder="Notes"></textarea>
  <button onclick="createVideo()">Save Video</button>
  <div id="videoList"></div>

  <!-- POSTING ENGINE -->
  <h2>Posting Engine</h2>
  <select id="postProject"></select>
  <select id="postScript"></select>
  <input id="postPlatform" placeholder="Platform (facebook, instagram, tiktok, etc.)">
  <textarea id="postContent" placeholder="Post Content"></textarea>
  <input id="postStatus" placeholder="Status (draft, scheduled, published)">
  <input id="postScheduledAt" placeholder="Scheduled At (YYYY-MM-DD HH:MM)">
  <input id="postLink" placeholder="Published Link (optional)">
  <button onclick="createPost()">Save Post</button>
  <div id="postList"></div>

<script>
// ---------------- BRAND ENGINE ----------------
async function createBrand() {
  const data = {
    name: brandName.value,
    description: brandDescription.value,
    tone: brandTone.value,
    colors: brandColors.value.split(','),
    audience: brandAudience.value,
    mission: brandMission.value,
    vision: brandVision.value
  };

  await fetch('/api/brands', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });

  loadBrands();
}

async function loadBrands() {
  const res = await fetch('/api/brands');
  const brands = await res.json();

  let html = "<h3>Brands</h3>";
  brands.forEach(b => {
    html += `<div class="card"><strong>${b.name}</strong><br>${b.description}</div>`;
  });

  brandList.innerHTML = html;

  let brandOptions = "";
  brands.forEach(b => brandOptions += `<option value="${b._id}">${b.name}</option>`);
  projectBrand.innerHTML = brandOptions;
}
loadBrands();

// ---------------- PROJECT ENGINE ----------------
async function createProject() {
  const data = {
    brandId: projectBrand.value,
    name: projectName.value,
    description: projectDescription.value,
    goal: projectGoal.value,
    type: projectType.value,
    audience: projectAudience.value,
    status: projectStatus.value
  };

  await fetch('/api/projects', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });

  loadProjects();
}

async function loadProjects() {
  const res = await fetch('/api/projects');
  const projects = await res.json();

  let html = "<h3>Projects</h3>";
  projects.forEach(p => {
    html += `<div class="card"><strong>${p.name}</strong><br>${p.description}</div>`;
  });

  projectList.innerHTML = html;

  let projectOptions = "";
  projects.forEach(p => projectOptions += `<option value="${p._id}">${p.name}</option>`);
  scriptProject.innerHTML = projectOptions;
  videoProject.innerHTML = projectOptions;
  postProject.innerHTML = projectOptions;
}
loadProjects();

// ---------------- SCRIPT ENGINE ----------------
async function createScript() {
  const data = {
    projectId: scriptProject.value,
    title: scriptTitle.value,
    prompt: scriptPrompt.value,
    tone: scriptTone.value,
    length: scriptLength.value
  };

  await fetch('/api/scripts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });

  loadScripts();
}

async function loadScripts() {
  const res = await fetch('/api/scripts');
  const scripts = await res.json();

  let html = "<h3>Scripts</h3>";
  scripts.forEach(s => {
    html += `<div class="card"><strong>${s.title}</strong><br>${s.prompt}</div>`;
  });

  scriptList.innerHTML = html;

  let scriptOptions = "";
  scripts.forEach(s => scriptOptions += `<option value="${s._id}">${s.title}</option>`);
  videoScript.innerHTML = scriptOptions;
  postScript.innerHTML = scriptOptions;
}
loadScripts();

// ---------------- VIDEO ENGINE ----------------
async function createVideo() {
  const data = {
    projectId: videoProject.value,
    scriptId: videoScript.value,
    title: videoTitle.value,
    format: videoFormat.value,
    duration: videoDuration.value,
    resolution: videoResolution.value,
    status: videoStatus.value,
    notes: videoNotes.value
  };

  await fetch('/api/videos', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });

  loadVideos();
}

async function loadVideos() {
  const res = await fetch('/api/videos');
  const videos = await res.json();

  let html = "<h3>Videos</h3>";
  videos.forEach(v => {
    html += `<div class="card"><strong>${v.title}</strong><br>${v.format} - ${v.duration}</div>`;
  });

  videoList.innerHTML = html;
}
loadVideos();

// ---------------- POSTING ENGINE ----------------
async function createPost() {
  const scheduledRaw = postScheduledAt.value.trim();
  const scheduledAt = scheduledRaw ? new Date(scheduledRaw) : null;

  const data = {
    projectId: postProject.value,
    scriptId: postScript.value || null,
    platform: postPlatform.value,
    content: postContent.value,
    status: postStatus.value || 'draft',
    scheduledAt,
    link: postLink.value
  };

  await fetch('/api/posts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });

  loadPosts();
}

async function loadPosts() {
  const res = await fetch('/api/posts');
  const posts = await res.json();

  let html = "<h3>Posts</h3>";
  posts.forEach(p => {
    html += `<div class="card">
      <strong>${p.platform}</strong> | ${p.status}<br>
      ${p.content}<br>
      <small>Project: ${p.projectId?.name || 'N/A'} | Script: ${p.scriptId?.title || 'N/A'}</small>
    </div>`;
  });

  postList.innerHTML = html;
}
loadPosts();

</script>

</body>
</html>
