<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AdCreator AI — Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #050509;
      color: #ffffff;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    .sidebar {
      width: 260px;
      background: #070712;
      border-right: 1px solid #26263a;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }
    .sidebar-logo {
      font-size: 20px;
      font-weight: 700;
    }
    .sidebar-nav div {
      padding: 12px 0;
      color: #a8a8c0;
      font-size: 15px;
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #050509;
    }
    .topbar {
      padding: 16px 28px;
      background: #070712;
      border-bottom: 1px solid #26263a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .content {
      padding: 28px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
      overflow-y: auto;
    }
    .card {
      background: #0d0d18;
      border: 1px solid #26263a;
      border-radius: 16px;
      padding: 20px;
    }
    .card h3 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 18px;
    }
    .generate-btn {
      background: linear-gradient(135deg, #ff2e88, #ff7ac4);
      border: none;
      padding: 14px 20px;
      color: white;
      border-radius: 12px;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
      margin-top: 10px;
    }
    .output-box {
      background: #00000033;
      border: 1px solid #26263a;
      padding: 14px;
      border-radius: 12px;
      height: 180px;
      overflow-y: auto;
      font-size: 14px;
      color: #a8a8c0;
      white-space: pre-wrap;
    }
    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #26263a;
      background: #050509;
      color: #ffffff;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-logo">AdCreator AI</div>
  <div class="sidebar-nav">
    <div>Dashboard</div>
    <div>Generate Ads</div>
    <div>Saved Campaigns</div>
    <div>My Account</div>
    <div>Settings</div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div style="font-size:22px;font-weight:600;">Dashboard</div>
  </div>

  <div class="content">
    <div class="card">
      <h3>Generate New Campaign</h3>
      <input id="product" placeholder="Product name" />
      <input id="audience" placeholder="Audience" />
      <button class="generate-btn" onclick="generate()">Generate</button>
    </div>

    <div class="card">
      <h3>Output</h3>
      <div id="output" class="output-box">Your generated ad copy will appear here.</div>
    </div>

    <div class="card">
      <h3>Saved Angles</h3>
      <div class="output-box">Coming soon…</div>
    </div>

    <div class="card">
      <h3>Performance Insights</h3>
      <div class="output-box">Coming soon…</div>
    </div>
  </div>
</div>

<script>
  function generate() {
    const product = document.getElementById('product').value || '[product]';
    const audience = document.getElementById('audience').value || '[audience]';
    document.getElementById('output').innerText =
      'Generating campaign for ' + product + ' targeting ' + audience +
      '…\n\n(This is where your backend response will appear.)';
  }
</script>

</body>
</html>
